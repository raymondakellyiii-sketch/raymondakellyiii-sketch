<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Contact the Midlands Tech Food Drive">
    <meta name="keywords" content="food drive, donate, volunteer, Midlands Tech, hunger relief">
    <title>MTC Food Drive - Contact Us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../Final_Project/css/stylesheet.css">
  </head>
  <body>
    <header>
      <!--Navigation w/ toggleable hamburger menu for smaller screens-->
      <nav class="navbar navbar-expand-md navbar-dark bg-primary">
        <div class="container-fluid">
          <a class="navbar-brand" href="index.html">
            <img src="../Final_Project/Images/mtclogo.png" alt="MTC Logo" height="50"> 
          </a>
          <h5 class="fw-bold">MTC Food Drive</h5>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                  aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
              <li class="nav-item"><a class="nav-link" href="projects.html">Projects</a></li>
              <li class="nav-item"><a class="nav-link" href="donate.html">Donate</a></li>
              <li class="nav-item"><a class="nav-link active" href="contact-us.html">Contact Us</a></li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <!--Hero banner-->
      <section class="bg-light text-dark py-5">
        <div class="container text-center">
          <h2 class="display-6 fw-bold">Get in Touch</h2>
          <p class="lead mb-4">
            Have questions or want to get involved? Reach out to the Midlands Tech Food Drive team.
          </p>
        </div>
      </section>
      <!--Contact form-->
      <section class="container my-5">
        <div class="row justify-content-center">
          <div class="col-md-6">
            <div class="card shadow-sm">
              <div class="card-body">
                <h5 class="card-title text-center fw-bold">Contact Form</h5>
                <form>
                  <!--Name-->
                  <div class="mb-3">
                    <label for="name" class="form-label fw-bold">Your Name</label>
                    <input type="text" id="name" name="name" class="form-control shadow-sm" required>
                  </div>
                  <!--Email-->
                  <div class="mb-3">
                    <label for="email" class="form-label fw-bold">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control shadow-sm" required>
                  </div>
                  <!--Subject line for reason of contact-->
                  <div class="mb-3">
                    <label for="subject" class="form-label fw-bold">Subject</label>
                    <input type="text" id="subject" name="subject" class="form-control shadow-sm">
                  </div>
                  <!--Message-->
                  <div class="mb-3">
                    <label for="message" class="form-label fw-bold">Message</label>
                    <textarea id="message" name="message" class="form-control shadow-sm" rows="5" required></textarea>
                  </div>
                  <button type="submit" class="btn btn-primary w-100">Send Message</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </section>
      <!--Embeded Google Map-->
      <section class="container my-5">
        <h5 class="text-center fw-bold mb-3">Find Us</h5>
        <div class="ratio ratio-16x9">
          <iframe src="https://www.google.com/maps/d/u/0/embed?mid=1wIHl5niibQ5GbZhI_Upy5be7cYOyrlU&ehbc=2E312F&noprof=1"
                  width="640" height="480" loading="async"></iframe>
        </div>
      </section>
    </main>
    <!--Footer-->
    <footer class="text-white text-center py-3">
        <p class="mb-0">&copy; 2025 MTC Food Drive. All Rights Reserved</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
